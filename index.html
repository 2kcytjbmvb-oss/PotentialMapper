<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electric Potential Mapper</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
#app { max-width: 1100px; margin: 0 auto; padding: 1rem; }
h1 { font-size: 1.1rem; font-weight: 600; color: #a0c4ff; margin-bottom: 0.5rem; letter-spacing: 0.02em; }
.controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.ctrl-label { font-size: 12px; color: #888; }
select { font-size: 12px; padding: 4px 10px; border: 1px solid #444; border-radius: 6px; background: #2a2a3e; color: #e0e0e0; cursor: pointer; }
.btn { font-size: 12px; padding: 4px 14px; border: 1px solid #444; border-radius: 6px; background: transparent; color: #ccc; cursor: pointer; }
.btn:hover { background: #2a2a3e; }
.btn-danger { border-color: #c0392b; color: #e74c3c; }
.btn-danger:hover { background: #2a1515; }
.canvases { display: flex; gap: 12px; flex-wrap: wrap; }
canvas { border-radius: 8px; border: 1px solid #333; cursor: crosshair; }
#map-canvas { background: #0d0d1a; }
#surface-canvas { background: #0d0d1a; cursor: grab; }
.info-bar { margin-top: 8px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
#vbadge { font-size: 1.1rem; font-weight: 700; color: #a0c4ff; min-width: 60px; }
#stat { font-size: 12px; color: #777; }
.legend { font-size: 11px; color: #666; margin-top: 6px; }
.canvas-label { font-size: 11px; color: #666; margin-bottom: 3px; }
</style>
</head>
<body>
<div id="app">
  <h1>⚡ Electric Potential Mapper</h1>
  <div class="controls">
    <span class="ctrl-label">Configuration:</span>
    <select id="cfg">
      <option value="bars">Parallel Bars (+ top, − bottom)</option>
      <option value="dipole">Point Charges (+ left, − right)</option>
      <option value="barpt">Bar + Point Charge</option>
      <option value="like">Like Charges (+ + )</option>
    </select>
    <button class="btn btn-danger" onclick="clearAll()">Clear Probes</button>
  </div>
  <div class="canvases">
    <div>
      <div class="canvas-label">📍 Click to probe voltage</div>
      <canvas id="map-canvas" width="480" height="400"></canvas>
    </div>
    <div>
      <div class="canvas-label">🔄 Drag to rotate 3D surface</div>
      <canvas id="surface-canvas" width="480" height="400"></canvas>
    </div>
  </div>
  <div class="info-bar">
    <div id="vbadge"></div>
    <div id="stat">0 probes — click the map to begin</div>
  </div>
  <div class="legend">Red = high potential (+V) · Blue = low potential (−V) · Click anywhere on the map to reveal voltage · 3D surface builds from your probes</div>
</div>

<script>
const MC = document.getElementById('map-canvas');
const SC = document.getElementById('surface-canvas');
const mc = MC.getContext('2d');
const sc = SC.getContext('2d');
const W = MC.width, H = MC.height;
let probes = [], drag = null, rotStart = { x: 0, y: 0 };
let rot = { x: 0.55, y: -0.6 };
let cfg = 'bars';

// Configurations: t='bar' needs x,y (0-1 normalized center), l=length fraction, v=voltage
//                 t='pt'  needs x,y (0-1 normalized), v=voltage, strength
const cfgs = {
  bars: {
    label: 'Parallel Bars',
    src: [
      { t:'bar', x:0.5, y:0.18, l:0.7, v:10,  col:'#e74c3c' },
      { t:'bar', x:0.5, y:0.82, l:0.7, v:-10, col:'#3498db' }
    ]
  },
  dipole: {
    label: 'Point Dipole',
    src: [
      { t:'pt', x:0.33, y:0.5, v:12, col:'#e74c3c' },
      { t:'pt', x:0.67, y:0.5, v:-12, col:'#3498db' }
    ]
  },
  barpt: {
    label: 'Bar + Point',
    src: [
      { t:'bar', x:0.5, y:0.15, l:0.65, v:10, col:'#e74c3c' },
      { t:'pt',  x:0.5, y:0.72, v:-10, col:'#3498db' }
    ]
  },
  like: {
    label: 'Like Charges',
    src: [
      { t:'pt', x:0.33, y:0.5, v:12, col:'#e74c3c' },
      { t:'pt', x:0.67, y:0.5, v:12, col:'#e74c3c' }
    ]
  }
};

// Compute voltage at pixel (px,py) given sources
function gv(px, py, src) {
  let v = 0;
  for (const s of src) {
    if (s.t === 'pt') {
      const dx = (px/W - s.x)*2.2, dy = (py/H - s.y)*1.8;
      const r = Math.sqrt(dx*dx + dy*dy) + 0.04;
      v += s.v / r;
    } else if (s.t === 'bar') {
      // Bar: integrate over length
      const cx = s.x*W, cy = s.y*H, hw = s.l*W/2;
      let bv = 0;
      const N = 30;
      for (let k = 0; k < N; k++) {
        const bx = cx - hw + (k + 0.5)*(hw*2/N);
        const dx = (px - bx)/W*2.2, dy = (py - cy)/H*1.8;
        const r = Math.sqrt(dx*dx + dy*dy) + 0.04;
        bv += s.v / (r * N);
      }
      v += bv;
    }
  }
  return Math.max(-20, Math.min(20, v));
}

// Voltage → RGB color (blue neg, white zero, red pos)
function vc(v, vmin, vmax) {
  const t = (v - vmin) / (vmax - vmin + 0.001);
  if (t < 0.5) {
    const s = t * 2;
    return [Math.round(30 + s*200), Math.round(60 + s*160), Math.round(220 - s*20)];
  } else {
    const s = (t - 0.5) * 2;
    return [Math.round(230 + s*15), Math.round(220 - s*180), Math.round(200 - s*190)];
  }
}

// Pre-render background voltage field as image
function bgImage(src) {
  const id = mc.createImageData(W, H);
  const d = id.data;
  // Find vmin/vmax for normalization
  let vmin = Infinity, vmax = -Infinity;
  const step = 8;
  for (let y = 0; y < H; y += step) {
    for (let x = 0; x < W; x += step) {
      const v = gv(x, y, src);
      if (v < vmin) vmin = v;
      if (v > vmax) vmax = v;
    }
  }
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const v = gv(x, y, src);
      const [r, g, b] = vc(v, vmin, vmax);
      const i = (y*W + x)*4;
      d[i] = r; d[i+1] = g; d[i+2] = b; d[i+3] = 60;
    }
  }
  return id;
}

// Draw equipotential lines using marching squares (simplified)
function drawEquipotentials(src, vmin, vmax) {
  mc.save();
  const levels = [];
  for (let i = 1; i <= 9; i++) levels.push(vmin + (vmax - vmin) * i / 10);
  const GS = 8;
  for (const lv of levels) {
    const [r, g, b] = vc(lv, vmin, vmax);
    mc.strokeStyle = `rgba(${r},${g},${b},0.5)`;
    mc.lineWidth = 0.8;
    mc.beginPath();
    for (let y = GS; y < H; y += GS) {
      for (let x = GS; x < W; x += GS) {
        const v00 = gv(x-GS, y-GS, src), v10 = gv(x, y-GS, src);
        const v01 = gv(x-GS, y, src),    v11 = gv(x, y, src);
        // Simple crossing check on each edge
        if ((v00 < lv) !== (v10 < lv)) {
          const t = (lv - v00)/(v10 - v00);
          const px1 = x - GS + t*GS, py1 = y - GS;
          if ((v00 < lv) !== (v01 < lv)) {
            const t2 = (lv - v00)/(v01 - v00);
            mc.moveTo(px1, py1); mc.lineTo(x - GS, y - GS + t2*GS);
          }
          if ((v10 < lv) !== (v11 < lv)) {
            const t2 = (lv - v10)/(v11 - v10);
            mc.moveTo(px1, py1); mc.lineTo(x, y - GS + t2*GS);
          }
          if ((v01 < lv) !== (v11 < lv)) {
            const t2 = (lv - v01)/(v11 - v01);
            mc.moveTo(px1, py1); mc.lineTo(x - GS + t2*GS, y);
          }
        }
      }
    }
    mc.stroke();
  }
  mc.restore();
}

function draw2D() {
  mc.clearRect(0, 0, W, H);
  mc.fillStyle = '#0d0d1a';
  mc.fillRect(0, 0, W, H);
  const src = cfgs[cfg].src;

  // Find range
  let vmin = Infinity, vmax = -Infinity;
  for (let y = 10; y < H; y += 10) for (let x = 10; x < W; x += 10) {
    const v = gv(x, y, src); if (v < vmin) vmin = v; if (v > vmax) vmax = v;
  }

  // Background gradient (faint)
  const id = mc.createImageData(W, H);
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    const v = gv(x, y, src);
    const [r, g, b] = vc(v, vmin, vmax);
    const i = (y*W + x)*4;
    id.data[i]=r; id.data[i+1]=g; id.data[i+2]=b; id.data[i+3]=55;
  }
  mc.putImageData(id, 0, 0);

  drawEquipotentials(src, vmin, vmax);

  // Draw sources
  for (const s of src) {
    if (s.t === 'bar') {
      mc.save();
      mc.fillStyle = s.col;
      mc.shadowColor = s.col;
      mc.shadowBlur = 10;
      mc.fillRect(s.x*W - s.l*W/2, s.y*H - 6, s.l*W, 12);
      mc.shadowBlur = 0;
      mc.fillStyle = '#fff';
      mc.font = 'bold 12px system-ui';
      mc.textAlign = 'center';
      mc.textBaseline = 'middle';
      mc.fillText(s.v > 0 ? '+' : '−', s.x*W, s.y*H);
      mc.restore();
    } else if (s.t === 'pt') {
      mc.save();
      mc.beginPath();
      mc.arc(s.x*W, s.y*H, 14, 0, Math.PI*2);
      mc.fillStyle = s.col;
      mc.shadowColor = s.col;
      mc.shadowBlur = 15;
      mc.fill();
      mc.shadowBlur = 0;
      mc.fillStyle = '#fff';
      mc.font = 'bold 14px system-ui';
      mc.textAlign = 'center';
      mc.textBaseline = 'middle';
      mc.fillText(s.v > 0 ? '+' : '−', s.x*W, s.y*H);
      mc.restore();
    }
  }

  // Draw probe dots
  for (const p of probes) {
    const v = p.v;
    const [r, g, b] = vc(v, vmin, vmax);
    mc.save();
    mc.beginPath();
    mc.arc(p.mx, p.my, 5, 0, Math.PI*2);
    mc.fillStyle = `rgb(${r},${g},${b})`;
    mc.strokeStyle = 'rgba(255,255,255,0.7)';
    mc.lineWidth = 1.2;
    mc.fill(); mc.stroke();
    mc.font = '9px system-ui';
    mc.fillStyle = '#eee';
    mc.textAlign = 'center';
    mc.textBaseline = 'bottom';
    mc.fillText((Math.round(v*10)/10).toFixed(1), p.mx, p.my - 6);
    mc.restore();
  }
}

// 3D projection
function proj(nx, ny, nz) {
  const cosX = Math.cos(rot.x), sinX = Math.sin(rot.x);
  const cosY = Math.cos(rot.y), sinY = Math.sin(rot.y);
  // Rotate around Y then X
  const x1 = nx*cosY - nz*sinY;
  const z1 = nx*sinY + nz*cosY;
  const y1 = ny*cosX - z1*sinX;
  const z2 = ny*sinX + z1*cosX;
  const scale = 180;
  const fov = 2.5 / (z2 + 3);
  return [W/2 + x1*scale*fov, H/2 - y1*scale*fov, z2];
}

function draw3D() {
  sc.clearRect(0, 0, W, H);
  sc.fillStyle = '#0d0d1a';
  sc.fillRect(0, 0, W, H);

  const src = cfgs[cfg].src;
  let vmin = -12, vmax = 12;
  if (probes.length > 0) {
    vmin = Math.min(...probes.map(p => p.v));
    vmax = Math.max(...probes.map(p => p.v));
    if (vmax - vmin < 2) { vmin -= 1; vmax += 1; }
  }

  const GX = 36, GY = 30;
  // Build grid of sampled values (only where probes are nearby)
  const grid = {};
  for (const p of probes) {
    const gi = Math.round(p.mx/W * GX);
    const gj = Math.round(p.my/H * GY);
    const key = gi + '_' + gj;
    if (!grid[key]) grid[key] = [];
    grid[key].push(p.v);
  }

  // Draw quads — only cells with at least one probe corner
  const quads = [];
  for (let i = 0; i < GX; i++) {
    for (let j = 0; j < GY; j++) {
      const corners = [
        grid[i+'_'+j], grid[(i+1)+'_'+j],
        grid[i+'_'+(j+1)], grid[(i+1)+'_'+(j+1)]
      ];
      const vals = corners.filter(Boolean).map(arr => arr.reduce((a,b)=>a+b,0)/arr.length);
      if (vals.length === 0) continue;
      const vA = vals.reduce((a,b)=>a+b,0)/vals.length;
      const nz = v => (v-vmin)/(vmax-vmin+.001)*1.4-.5;
      const nx0 = i/GX*2-1, nx1 = (i+1)/GX*2-1;
      const ny0 = j/GY*2-1, ny1 = (j+1)/GY*2-1;
      const p00 = proj(nx0,ny0,nz(vA)), p10 = proj(nx1,ny0,nz(vA));
      const p01 = proj(nx0,ny1,nz(vA)), p11 = proj(nx1,ny1,nz(vA));
      const az = (p00[2]+p10[2]+p01[2]+p11[2])/4;
      quads.push({ vA, p00, p10, p01, p11, az, full: vals.length===4 });
    }
  }
  quads.sort((a,b) => b.az - a.az);

  for (const { vA, p00, p10, p01, p11, full } of quads) {
    const [r,g,b] = vc(vA, vmin, vmax);
    sc.fillStyle = `rgba(${r},${g},${b},${full ? 0.82 : 0.38})`;
    sc.strokeStyle = `rgba(${r},${g},${b},0.2)`;
    sc.lineWidth = 0.5;
    sc.beginPath();
    sc.moveTo(p00[0],p00[1]); sc.lineTo(p10[0],p10[1]);
    sc.lineTo(p11[0],p11[1]); sc.lineTo(p01[0],p01[1]);
    sc.closePath(); sc.fill(); sc.stroke();
  }

  // Probe spikes
  for (const p of probes) {
    const nx = p.mx/W*2-1, ny = p.my/H*2-1;
    const nz = (p.v-vmin)/(vmax-vmin+.001)*1.4-.5;
    const [px,py] = proj(nx, ny, nz);
    const [bx,by] = proj(nx, ny, -0.5);
    const [r,g,b] = vc(p.v, vmin, vmax);
    sc.strokeStyle = `rgba(${r},${g},${b},0.85)`; sc.lineWidth = 1.5;
    sc.beginPath(); sc.moveTo(bx,by); sc.lineTo(px,py); sc.stroke();
    sc.beginPath(); sc.arc(px, py, 4, 0, Math.PI*2);
    sc.fillStyle = `rgb(${r},${g},${b})`; sc.fill();
    sc.strokeStyle = 'rgba(0,0,0,0.25)'; sc.lineWidth = 0.8; sc.stroke();
  }

  sc.fillStyle = '#666'; sc.font = '10px system-ui';
  sc.textAlign = 'center'; sc.textBaseline = 'bottom';
  sc.fillText('drag to rotate', W/2, H-3);
}

function render() { draw2D(); draw3D(); }

function clearAll() {
  probes = [];
  document.getElementById('vbadge').textContent = '';
  document.getElementById('stat').textContent = '0 probes — click the map to begin';
  render();
}

document.getElementById('cfg').addEventListener('change', function() {
  cfg = this.value; clearAll();
});

function gpos(e, c) {
  const r = c.getBoundingClientRect();
  return { x: (e.clientX - r.left)*c.width/r.width, y: (e.clientY - r.top)*c.height/r.height };
}

MC.addEventListener('click', function(e) {
  const pos = gpos(e, MC), src = cfgs[cfg].src;
  for (const s of src) {
    if (s.t==='pt' && Math.sqrt((pos.x-s.x*W)**2+(pos.y-s.y*H)**2) < 18) return;
    if (s.t==='bar' && Math.abs(pos.y-s.y*H) < 10 && pos.x > s.x*W-s.l*W/2 && pos.x < s.x*W+s.l*W/2) return;
  }
  const v = gv(pos.x, pos.y, src);
  probes.push({ mx: pos.x, my: pos.y, v });
  document.getElementById('vbadge').textContent = (Math.round(v*10)/10).toFixed(1) + ' V';
  document.getElementById('stat').textContent = probes.length + ' probe' + (probes.length===1?'':'s') + ' — keep going!';
  render();
});

MC.addEventListener('mousemove', function(e) {
  const pos = gpos(e, MC);
  document.getElementById('vbadge').textContent = (Math.round(gv(pos.x, pos.y, cfgs[cfg].src)*10)/10).toFixed(1) + ' V';
});

SC.addEventListener('mousedown', function(e) { drag = gpos(e,SC); rotStart = {x:rot.x,y:rot.y}; SC.style.cursor='grabbing'; });
SC.addEventListener('mousemove', function(e) {
  if (!drag) return;
  const p = gpos(e, SC);
  rot.x = rotStart.x + (p.y - drag.y)*0.009;
  rot.y = rotStart.y + (p.x - drag.x)*0.009;
  draw3D();
});
SC.addEventListener('mouseup', () => { drag=null; SC.style.cursor='grab'; });
SC.addEventListener('mouseleave', () => { drag=null; });

SC.addEventListener('touchstart', function(e) { e.preventDefault(); drag=gpos(e.touches[0],SC); rotStart={x:rot.x,y:rot.y}; }, {passive:false});
SC.addEventListener('touchmove', function(e) {
  e.preventDefault(); if (!drag) return;
  const p = gpos(e.touches[0], SC);
  rot.x = rotStart.x + (p.y-drag.y)*0.009;
  rot.y = rotStart.y + (p.x-drag.x)*0.009;
  draw3D();
}, {passive:false});
SC.addEventListener('touchend', () => { drag=null; });

MC.addEventListener('touchstart', function(e) {
  e.preventDefault();
  const pos = gpos(e.touches[0], MC);
  const v = gv(pos.x, pos.y, cfgs[cfg].src);
  probes.push({ mx: pos.x, my: pos.y, v });
  document.getElementById('stat').textContent = probes.length + ' probe' + (probes.length===1?'':'s') + ' — keep going!';
  render();
}, {passive:false});

render();
</script>
</body>
</html>
